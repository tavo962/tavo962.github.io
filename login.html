<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión — Whiskey Industries</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0a0a0f;
      font-family: 'Inter', system-ui, sans-serif;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── Animated gradient background ─────────────── */
    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .bg-gradient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(
        -45deg,
        #0a0a0f,
        #0f0a2e,
        #0a0f2e,
        #0d0a1f,
        #12062e,
        #060d1f,
        #0a0a0f
      );
      background-size: 400% 400%;
      animation: gradientShift 18s ease infinite;
    }

    /* ── Noise grain overlay ───────────────────────── */
    .grain {
      position: fixed;
      inset: -50%;
      width: 200%; height: 200%;
      pointer-events: none;
      opacity: .03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    /* ── Glass card ────────────────────────────────── */
    .card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 400px;
      margin: 0 1.5rem;
      background: rgba(255,255,255,.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      animation: slideUp .7s cubic-bezier(.16,1,.3,1) forwards;
      opacity: 0;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Logo / brand ──────────────────────────────── */
    .brand-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(99,102,241,.15);
      border: 1px solid rgba(99,102,241,.3);
      border-radius: 999px;
      padding: 4px 14px;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #a5b4fc;
      margin-bottom: 1.5rem;
    }
    .brand-dot {
      width: 7px; height: 7px;
      background: #818cf8;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .4; }
    }

    /* ── Avatar ring ───────────────────────────────── */
    .avatar-wrap {
      position: relative;
      width: 72px; height: 72px;
      margin: 0 auto 1.25rem;
    }
    .avatar-ring {
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #7c3aed, #06b6d4);
      opacity: .7;
      filter: blur(4px);
    }
    .avatar-inner {
      position: relative;
      width: 72px; height: 72px;
      border-radius: 50%;
      background: #0f172a;
      border: 2px solid rgba(255,255,255,.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -.02em;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: .4rem;
      text-align: center;
    }
    .subtitle {
      font-size: .875rem;
      color: rgba(255,255,255,.45);
      text-align: center;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    /* ── Divider ───────────────────────────────────── */
    .divider {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-bottom: 1.5rem;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,.08);
    }
    .divider span {
      font-size: .72rem;
      color: rgba(255,255,255,.3);
      font-weight: 500;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    /* ── Google button ─────────────────────────────── */
    #btn-google {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .75rem;
      padding: .8rem 1.5rem;
      border-radius: 12px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.12);
      color: #fff;
      font-family: inherit;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, border-color .2s, transform .15s;
      outline: none;
    }
    #btn-google:hover:not(:disabled) {
      background: rgba(255,255,255,.12);
      border-color: rgba(99,102,241,.5);
      transform: translateY(-1px);
    }
    #btn-google:active:not(:disabled) {
      transform: translateY(0);
    }
    #btn-google:disabled {
      opacity: .5;
      cursor: not-allowed;
    }
    .google-icon {
      width: 20px; height: 20px;
      flex-shrink: 0;
    }

    /* ── Error / status ────────────────────────────── */
    #status {
      margin-top: 1rem;
      padding: .65rem 1rem;
      border-radius: 10px;
      font-size: .82rem;
      font-weight: 500;
      text-align: center;
      display: none;
    }
    #status.error {
      display: block;
      background: rgba(239,68,68,.12);
      border: 1px solid rgba(239,68,68,.3);
      color: #fca5a5;
    }
    #status.info {
      display: block;
      background: rgba(99,102,241,.12);
      border: 1px solid rgba(99,102,241,.3);
      color: #a5b4fc;
    }

    /* ── Footer note ───────────────────────────────── */
    .card-footer {
      margin-top: 1.5rem;
      font-size: .75rem;
      color: rgba(255,255,255,.25);
      text-align: center;
      line-height: 1.6;
    }
    .card-footer a {
      color: rgba(165,180,252,.6);
      text-decoration: none;
    }
    .card-footer a:hover { color: #a5b4fc; }

    /* ── Spinner ───────────────────────────────────── */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- Animated background -->
  <div class="bg-gradient"></div>
  <div class="grain"></div>

  <!-- Login card -->
  <div class="card">
    <div style="text-align:center">
      <div class="brand-badge">
        <span class="brand-dot"></span>
        Whiskey Industries
      </div>
    </div>

    <div class="avatar-wrap">
      <div class="avatar-ring"></div>
      <div class="avatar-inner">W</div>
    </div>

    <h1>Bienvenido</h1>
    <p class="subtitle">Acceso restringido al equipo<br>de Whiskey Industries</p>

    <div class="divider"><span>Continuar con</span></div>

    <button id="btn-google" type="button">
      <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      <span id="btn-label">Iniciar sesión con Google</span>
      <span class="spinner" id="spinner"></span>
    </button>

    <div id="status"></div>

    <div class="card-footer">
      Solo usuarios con dominio <strong style="color:rgba(165,180,252,.7)">@whikeyindustries.net</strong><br>
      tienen acceso a este panel. <a href="index.html">← Volver</a>
    </div>
  </div>

  <script type="module">
    import { app }     from "./firebase.js";
    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      onAuthStateChanged,
      signOut,
    } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

    const ALLOWED_DOMAIN = "whikeyindustries.net";

    const auth     = getAuth(app);
    const provider = new GoogleAuthProvider();
    provider.setCustomParameters({ prompt: "select_account" });

    const btnGoogle = document.getElementById("btn-google");
    const btnLabel  = document.getElementById("btn-label");
    const spinner   = document.getElementById("spinner");
    const status    = document.getElementById("status");

    function setLoading(loading) {
      btnGoogle.disabled = loading;
      btnLabel.textContent = loading ? "Verificando..." : "Iniciar sesión con Google";
      spinner.style.display = loading ? "block" : "none";
    }

    function showError(msg) {
      status.className = "error";
      status.textContent = msg;
    }

    function showInfo(msg) {
      status.className = "info";
      status.textContent = msg;
    }

    /* If already signed in with the right domain, go straight to dash */
    onAuthStateChanged(auth, user => {
      if (user) {
        const domain = user.email.split("@")[1];
        if (domain === ALLOWED_DOMAIN) {
          window.location.replace("dash.html");
        } else {
          signOut(auth);
        }
      }
    });

    btnGoogle.addEventListener("click", async () => {
      setLoading(true);
      status.className = "";
      status.style.display = "none";

      try {
        const result = await signInWithPopup(auth, provider);
        const email  = result.user.email;
        const domain = email.split("@")[1];

        if (domain !== ALLOWED_DOMAIN) {
          await signOut(auth);
          showError(`Acceso denegado: ${email} no pertenece a @${ALLOWED_DOMAIN}`);
          setLoading(false);
          return;
        }

        showInfo("Acceso concedido, redirigiendo…");
        window.location.replace("dash.html");

      } catch (err) {
        if (err.code !== "auth/popup-closed-by-user") {
          showError("Error al iniciar sesión. Inténtalo de nuevo.");
          console.error(err);
        }
        setLoading(false);
      }
    });
  </script>
</body>
</html>
